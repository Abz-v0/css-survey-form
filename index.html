<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey form</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="container">
        <header>
            <h1>Quick Feedback Survey</h1>
            <p>Thank you for viewing my tibute page! Share your thoughts below.</p>
        </header>

        <form id="survey-form">
            <fieldset>
                <legend>Personal Information</legend>

                <label for="name">Name (optional):</label>
                <input type="text" id="name" name="name" placeholder="Enter your name">

                <label for="email">Email (required):</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>

                <label for="age">Age (optional):</label>
                <input type="number" id="age" name="age" min="13" placeholder="Enter your age">
            </fieldset>

            <fieldset>
                <legend>Your Feedback</legend>

                <label>Overall, how would you rate my tribute page?</label>
                <select name="rating" id="rating" required>
                    <option value="">Select an option</option>
                    <option value="excellent">Excellent</option>
                     <option value="good">Good</option>
                      <option value="average">Average</option>
                       <option value="poor">Poor</option>
                </select>

                <label>What did you like the most? (check all that apply)</label>
                <label><input type="checkbox" name="likes" value="design">The design & styling</label>
                <label><input type="checkbox" name="likes" value="content">The content & timeline</label>
                <label><input type="checkbox" name="likes" value="image">The image & quote</label>
                <label><input type="checkbox" name="likes" value="other">Other</label>

                <label for="comments">Any comments or suggestion?</label>
                <textarea name="comments" id="comments" rows="5" placeholder="Your thoughts..." required></textarea>

                <label>Would you recommend this page to others?</label>
                <label><input type="radio" name="recommend" value="yes" required>Yes</label>
                <label><input type="radio" name="recommend" value="maybe">Maybe</label>
                <label><input type="radio" name="recommend" value="no">No</label>

            </fieldset>

            <button type="submit">Submit Feedback</button>
        </form>

        <footer>
            <p>Thanks for your time! Built with HTML & CSS by Abraham</p>
        </footer>
    </main>
    
</body>
</html>
